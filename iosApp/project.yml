name: ICSApp
options:
  bundleIdPrefix: com.livingpresence.inner.circle
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  ICSApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ics_ios
        excludes:
          - "Info.plist"
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    info:
      path: Info.plist
      properties:
        DEEPGRAM_API_KEY: "$(DEEPGRAM_API_KEY)"
        SONIOX_API_KEY: "$(SONIOX_API_KEY)"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        # CADisableMinimumFrameDurationOnPhone is REQUIRED by Compose
        # Multiplatform's PlistSanityCheck — without it, the app crashes ~3s
        # after launch (CMP-8608). It enables 120Hz ProMotion frame rates on
        # iPhone and is mandatory for CMP's iOS rendering loop.
        CADisableMinimumFrameDurationOnPhone: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.livingpresence.inner.circle.squared
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        # The Kotlin/Native framework is built by Gradle into composeApp/build.
        # We link it as an embedded framework.
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework"
          - "$(SRCROOT)/../composeApp/build/bin/iosArm64/debugFramework"
        OTHER_LDFLAGS:
          - "$(inherited)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    dependencies:
      - framework: "$(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework"
        embed: true
        implicit: true
      - sdk: MediaToolbox.framework
    preBuildScripts:
      - name: Generate Secrets.xcconfig
        script: |
          PROPS_FILE="${SRCROOT}/../secrets.properties"
          XCCONFIG_FILE="${SRCROOT}/Secrets.xcconfig"
          if [ -f "$PROPS_FILE" ]; then
            grep "^DEEPGRAM_API_KEY=" "$PROPS_FILE" > "$XCCONFIG_FILE"
            grep "^SONIOX_API_KEY=" "$PROPS_FILE" >> "$XCCONFIG_FILE"
          else
            echo "DEEPGRAM_API_KEY=" > "$XCCONFIG_FILE"
            echo "SONIOX_API_KEY=" >> "$XCCONFIG_FILE"
          fi
