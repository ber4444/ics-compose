name: ICSApp
options:
  bundleIdPrefix: com.livingpresence.inner.circle
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  ICSApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ics_ios
        excludes:
          - "Info.plist"
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        # CADisableMinimumFrameDurationOnPhone is REQUIRED by Compose
        # Multiplatform's PlistSanityCheck — without it, the app crashes ~3s
        # after launch (CMP-8608). It enables 120Hz ProMotion frame rates on
        # iPhone and is mandatory for CMP's iOS rendering loop.
        CADisableMinimumFrameDurationOnPhone: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.livingpresence.inner.circle.squared
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        # The Kotlin/Native framework is built by Gradle into composeApp/build.
        # We link it as an embedded framework.
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework"
          - "$(SRCROOT)/../composeApp/build/bin/iosArm64/debugFramework"
        OTHER_LDFLAGS:
          - "$(inherited)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    dependencies:
      - framework: "$(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework"
        embed: true
        implicit: true
      - sdk: MediaToolbox.framework
    postCompileScripts:
      - name: Inject Secrets into Info.plist
        script: |
          PROPS_FILE="${SRCROOT}/../secrets.properties"
          PLIST_PATH="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          if [ -f "$PROPS_FILE" ] && [ -f "$PLIST_PATH" ]; then
            DEEPGRAM_API_KEY=$(grep "^DEEPGRAM_API_KEY=" "$PROPS_FILE" | cut -d'=' -f2)
            SONIOX_API_KEY=$(grep "^SONIOX_API_KEY=" "$PROPS_FILE" | cut -d'=' -f2)
            ASSEMBLYAI_API_KEY=$(grep "^ASSEMBLYAI_API_KEY=" "$PROPS_FILE" | cut -d'=' -f2)
            
            if [ -n "$DEEPGRAM_API_KEY" ]; then
              /usr/libexec/PlistBuddy -c "Set :DEEPGRAM_API_KEY $DEEPGRAM_API_KEY" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :DEEPGRAM_API_KEY string $DEEPGRAM_API_KEY" "$PLIST_PATH"
            fi
            if [ -n "$SONIOX_API_KEY" ]; then
              /usr/libexec/PlistBuddy -c "Set :SONIOX_API_KEY $SONIOX_API_KEY" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :SONIOX_API_KEY string $SONIOX_API_KEY" "$PLIST_PATH"
            fi
            if [ -n "$ASSEMBLYAI_API_KEY" ]; then
              /usr/libexec/PlistBuddy -c "Set :ASSEMBLYAI_API_KEY $ASSEMBLYAI_API_KEY" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Add :ASSEMBLYAI_API_KEY string $ASSEMBLYAI_API_KEY" "$PLIST_PATH"
            fi
          fi

